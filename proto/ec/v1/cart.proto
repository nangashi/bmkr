syntax = "proto3";

package ec.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/nangashi/bmkr/gen/go/ec/v1;ecv1";

message Cart {
  int64 id = 1;
  int64 customer_id = 2;
  repeated CartItem items = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message CartItem {
  int64 id = 1;
  int64 product_id = 2;
  int32 quantity = 3;
  google.protobuf.Timestamp created_at = 4;
}

message GetCartRequest {
  int64 customer_id = 1;
}

message GetCartResponse {
  Cart cart = 1;
}

service CartService {
  rpc GetCart(GetCartRequest) returns (GetCartResponse);
}
