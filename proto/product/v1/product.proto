syntax = "proto3";

package product.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/nangashi/bmkr/gen/go/product/v1;productv1";

message Product {
  int64 id = 1;
  string name = 2;
  string description = 3;
  int64 price = 4;
  int64 stock_quantity = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  int64 price = 3;
  int64 stock_quantity = 4;
}

message CreateProductResponse {
  Product product = 1;
}

message GetProductRequest {
  int64 id = 1;
}

message GetProductResponse {
  Product product = 1;
}

message ListProductsRequest {}

message ListProductsResponse {
  repeated Product products = 1;
}

message BatchGetProductsRequest {
  repeated int64 ids = 1;
}

message BatchGetProductsResponse {
  repeated Product products = 1;
}

service ProductService {
  // CreateProduct creates a new product.
  //
  // Pre:
  //   - name must be non-empty
  //   - price must be 0 or greater
  //   - stock_quantity must be 0 or greater
  //
  // Post:
  //   - product is created in the DB and returned with an assigned id
  //
  // Rejects:
  //   INVALID_ARGUMENT — name is empty, price is negative, or stock_quantity is negative
  //
  // Defers:
  //   商品名の一意性チェックは行わない（DB スキーマに UNIQUE 制約なし）
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);

  // GetProduct returns the product with the given id.
  //
  // Rejects:
  //   INVALID_ARGUMENT — id is 0 or negative
  //   NOT_FOUND        — no product with the given id exists
  //
  // Defers:
  //   商品の論理削除・公開フラグ等のフィルタリングは行わない
  rpc GetProduct(GetProductRequest) returns (GetProductResponse);

  // ListProducts returns all products.
  //
  // Rejects:
  //   該当なし（リクエストフィールドなし）
  //
  // Defers:
  //   ページネーションは実装しない（学習用実装のため全件取得を優先する）
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);

  // BatchGetProducts returns products for the given IDs.
  //
  // Pre:
  //   - ids must contain at least 1 and at most 100 elements
  //   - each id must be a positive integer
  //
  // Post:
  //   - returns found products only; unknown IDs are silently omitted
  //   - duplicate IDs are deduplicated; each product is returned at most once
  //   - products are returned in arbitrary order (not guaranteed to match request order)
  //
  // Rejects:
  //   INVALID_ARGUMENT — ids is empty, exceeds 100 elements, or contains non-positive values
  //
  // Defers:
  //   存在しない ID に対するエラー通知は行わない（部分取得を許容）
  rpc BatchGetProducts(BatchGetProductsRequest) returns (BatchGetProductsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}
