services:
  dev:
    build: .
    volumes:
      - .:/workspace
      - claude-config:/root/.claude
      - codex-config:/root/.codex
      - takt-config:/root/.takt
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAKT_ANTHROPIC_API_KEY=${TAKT_ANTHROPIC_API_KEY}
      - TAKT_OPENAI_API_KEY=${TAKT_OPENAI_API_KEY}
    stdin_open: true
    tty: true

volumes:
  claude-config:
  codex-config:
  takt-config:
