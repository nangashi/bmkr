name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate code
        run: just generate

      - name: Check (lint + typecheck)
        run: just check

      - name: Format check
        run: just fmt-check

      - name: Test
        run: just test

      - name: Secret scan
        run: just secret-scan
